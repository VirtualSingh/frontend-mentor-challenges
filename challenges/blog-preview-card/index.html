<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card</title>
    <link rel="shortcut icon" href="../../assets/blog-preview-card/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="../../assets/blog-preview-card/images/illustration-article.svg" alt="illustration-article" class="card-image">
            <div class="card-content">
                <span class="card-category">Learning</span>
                <span class="publish-date">Published 12 Jan 2023</span>
                <h1 class="card-title">HTML & CSS foundations</h1>
                <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
            </div>
            <div class="author">
                <img src="../../assets/blog-preview-card/images/image-avatar.webp" alt="avatar-michelle" class="author-avatar">
                <span class="author-name">Greg Hooper</span>
            </div>
        </div>
    </div>
</body>
</html>
